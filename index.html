<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Mommy Birthday Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Schoolbell&display=swap');

    :root {
      --pink: #f67fa1;
      --pink-dark: #d94f79;
      --pink-soft: #ffd6e2;
      --cream: #fffdf7;
      --ink: #242424;
      --shadow: rgba(168, 54, 92, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Gaegu", "Comic Sans MS", cursive;
      background: radial-gradient(circle at top left, #ffeaf0 0, #ffc6d7 30%, #f67fa1 100%);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .page-wrap {
      width: min(1100px, 100%);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: "Schoolbell", "Comic Sans MS", cursive;
      font-size: 1rem;
      background: var(--cream);
      color: var(--pink-dark);
      box-shadow: 0 6px 12px var(--shadow);
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .card {
      position: relative;
      background: var(--pink);
      border: 10px solid #f986a8;
      border-radius: 12px;
      padding: clamp(16px, 3vw, 30px);
      box-shadow: 0 18px 40px rgba(101, 25, 57, 0.25);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.7) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,0.35) 0 1px, transparent 2px);
      background-size: 54px 54px, 33px 33px;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .top {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: white;
      font-family: "Schoolbell", "Comic Sans MS", cursive;
      font-size: clamp(3.6rem, 10vw, 8rem);
      line-height: 0.9;
      letter-spacing: 2px;
      text-shadow: 3px 4px 0 rgba(197, 56, 102, 0.35);
    }

    .by-age {
      display: grid;
      gap: 12px;
      padding-top: 8px;
    }

    .mini-field {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      background: var(--cream);
      border-radius: 999px;
      min-height: 56px;
      padding: 8px 18px;
      box-shadow: inset 0 -3px 0 rgba(218, 79, 121, 0.12);
      font-size: 1.7rem;
      font-weight: 700;
    }

    .mini-field input {
      width: 100%;
      border: 0;
      border-bottom: 2px dashed rgba(217, 79, 121, 0.35);
      background: transparent;
      outline: none;
      font: 700 1.7rem "Schoolbell", cursive;
      color: #3f3f3f;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .box {
      position: relative;
      background: var(--cream);
      border-radius: 34px;
      padding: 20px 22px 18px;
      min-height: 145px;
      box-shadow: inset 0 -4px 0 rgba(218, 79, 121, 0.1), 0 8px 12px rgba(132, 27, 68, 0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .box.tall {
      min-height: 340px;
    }

    .box.small {
      min-height: 124px;
    }

    .box.wide {
      min-height: 120px;
    }

    .box.cloud {
      border-radius: 46% 54% 45% 55% / 60% 48% 52% 40%;
      min-height: 175px;
    }

    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-7 { grid-column: span 7; }
    .span-8 { grid-column: span 8; }

    label {
      display: block;
      font-size: clamp(1.1rem, 2vw, 1.55rem);
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.15;
      text-transform: uppercase;
    }

    textarea,
    input.answer {
      width: 100%;
      flex: 1;
      resize: none;
      border: 0;
      outline: none;
      background:
        repeating-linear-gradient(
          transparent 0,
          transparent 30px,
          rgba(217, 79, 121, 0.14) 31px,
          transparent 32px
        );
      font: 700 clamp(1.25rem, 2.6vw, 2rem) "Schoolbell", "Comic Sans MS", cursive;
      color: #444;
      line-height: 1.25;
      padding-top: 4px;
    }

    .icon {
      position: absolute;
      right: 18px;
      bottom: 14px;
      font-size: 2.2rem;
      transform: rotate(-7deg);
      opacity: 0.92;
      pointer-events: none;
    }

    .heart-float {
      position: absolute;
      color: rgba(255, 255, 255, 0.75);
      font-size: 1.3rem;
      animation: floaty 5s ease-in-out infinite;
      pointer-events: none;
    }

    .heart-float.one { top: 18%; right: 4%; }
    .heart-float.two { top: 54%; left: 31%; animation-delay: 1s; }
    .heart-float.three { bottom: 12%; right: 27%; animation-delay: 2s; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      border-radius: 3px;
      animation: fall 2.8s linear forwards;
      z-index: 9999;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .note {
      text-align: center;
      margin: 12px auto 0;
      color: #7c2444;
      font-size: 1.1rem;
    }

    @media (max-width: 800px) {
      body {
        padding: 10px;
      }

      .top {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .span-3,
      .span-4,
      .span-5,
      .span-6,
      .span-7,
      .span-8 {
        grid-column: span 1;
      }

      .box,
      .box.tall,
      .box.cloud {
        min-height: 150px;
      }

      h1 {
        text-align: center;
      }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .toolbar,
      .note {
        display: none;
      }

      .card {
        box-shadow: none;
        border-radius: 0;
        width: 100%;
        min-height: 100vh;
      }

      textarea,
      input {
        color: #333 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <div class="toolbar" aria-label="Card actions">
      <button type="button" onclick="launchConfetti()">🎉 Birthday Confetti</button>
      <button type="button" onclick="window.print()">🖨️ Print / Save as PDF</button>
      <button type="button" onclick="clearAnswers()">🧽 Clear Answers</button>
    </div>

    <section class="card" aria-label="Interactive birthday card for mommy">
      <span class="heart-float one">♡</span>
      <span class="heart-float two">♡</span>
      <span class="heart-float three">♡</span>

      <div class="top">
        <h1>MY MOMMY</h1>
        <div class="by-age">
          <div class="mini-field"><span>By</span><input id="by" data-save placeholder="" /></div>
          <div class="mini-field"><span>Age</span><input id="age" data-save placeholder="" /></div>
        </div>
      </div>

      <div class="grid">
        <article class="box span-7">
          <label for="mom-name">What is Mommy’s name?</label>
          <textarea id="mom-name" data-save></textarea>
          <span class="icon">💌</span>
        </article>

        <article class="box span-5">
          <label for="mom-age">How old is Mommy?</label>
          <textarea id="mom-age" data-save></textarea>
          <span class="icon">🎂</span>
        </article>

        <article class="box span-6 small">
          <label for="mom-tall">How tall is Mommy?</label>
          <textarea id="mom-tall" data-save></textarea>
          <span class="icon">📏</span>
        </article>

        <article class="box span-6 small">
          <label for="cartoon">If Mommy were a cartoon character she would be...</label>
          <textarea id="cartoon" data-save></textarea>
          <span class="icon">📺</span>
        </article>

        <article class="box span-3 tall">
          <label for="favorite-thing">My favorite thing to do with my Mommy is...</label>
          <textarea id="favorite-thing" data-save></textarea>
          <span class="icon">💗</span>
        </article>

        <article class="box span-5 cloud">
          <label for="always-says">Mommy always says...</label>
          <textarea id="always-says" data-save></textarea>
          <span class="icon">📣</span>
        </article>

        <article class="box span-4 cloud">
          <label for="loves-you">How do you know Mommy loves you?</label>
          <textarea id="loves-you" data-save></textarea>
          <span class="icon">💝</span>
        </article>

        <article class="box span-5 small">
          <label for="favorite-food">Mommy’s favorite food is...</label>
          <textarea id="favorite-food" data-save></textarea>
          <span class="icon">🍴</span>
        </article>

        <article class="box span-4 small">
          <label for="not-good-at">What is Mommy not so good at?</label>
          <textarea id="not-good-at" data-save></textarea>
          <span class="icon">🌧️</span>
        </article>

        <article class="box span-3 small">
          <label for="good-at">What is Mommy good at?</label>
          <textarea id="good-at" data-save></textarea>
          <span class="icon">⭐</span>
        </article>

        <article class="box span-4 small">
          <label for="favorite-place">Where is Mommy’s favorite place to go?</label>
          <textarea id="favorite-place" data-save></textarea>
          <span class="icon">🚗</span>
        </article>

        <article class="box span-4 small">
          <label for="job">What is Mommy’s job?</label>
          <textarea id="job" data-save></textarea>
          <span class="icon">💻</span>
        </article>

        <article class="box span-8 wide">
          <label for="best-thing">The best thing about Mommy is...</label>
          <textarea id="best-thing" data-save></textarea>
          <span class="icon">🌸</span>
        </article>

        <article class="box span-4 wide">
          <label for="message">My message for Mommy</label>
          <textarea id="message" data-save></textarea>
          <span class="icon">✏️</span>
        </article>
      </div>
    </section>

    <p class="note">Type the answers directly into the card. They auto-save in this browser.</p>
  </main>

  <script>
    const fields = document.querySelectorAll('[data-save]');
    const storagePrefix = 'mommy-birthday-card-';

    fields.forEach((field) => {
      const saved = localStorage.getItem(storagePrefix + field.id);
      if (saved !== null) field.value = saved;
      field.addEventListener('input', () => {
        localStorage.setItem(storagePrefix + field.id, field.value);
      });
    });

    function clearAnswers() {
      const okay = confirm('Clear all answers on this card?');
      if (!okay) return;
      fields.forEach((field) => {
        field.value = '';
        localStorage.removeItem(storagePrefix + field.id);
      });
    }

    function launchConfetti() {
      const colors = ['#ffffff', '#ffd166', '#f8a5c2', '#cdb4db', '#b8f2e6', '#ff6b9a'];
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3500);
      }
    }

    window.addEventListener('load', () => {
      setTimeout(launchConfetti, 500);
    });
  </script>
</body>
</html>
